version: "3.8"
services:
  backend:
    image: golang:1.22-alpine
    working_dir: /workspace/backend
    volumes:
      - ./backend:/workspace/backend
    ports:
      - "8080:8080"
    command: go run main.go

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
